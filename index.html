<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Music Player</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-white">

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block bg-black sidebar vh-100">
                <div class="sidebar-sticky p-3">
                    <h5 class="text-white">My Player</h5>
                    <ul class="nav flex-column mt-3">
                        <li class="nav-item">
                            <a class="nav-link active text-white" href="#" id="home-link">
                                <i class="bi bi-house-door-fill"></i> Home
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" id="search-link">
                                <i class="bi bi-search"></i> Search
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" id="library-link">
                                <i class="bi bi-collection-fill"></i> Your Library
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-12 px-md-4 main-content">

            <div id="home-view">
                <h2 class="mt-4">Welcome Back!</h2>
                <p>Check out some music.</p>
                
                <div class="row" id="song-list-container">
                    </div>
            </div>

            <div id="search-view" style="display: none;">
                <h2 class="mt-4">Search</h2>
                <p>Search for your favorite songs or artists.</p>
                
                <div class="row mt-4">
                    <div class="col-md-8">
                        <input type="text" class="form-control form-control-lg" placeholder="What do you want to listen to?" id="search-input">
                    </div>
                </div>

                <div class="row mt-4" id="search-results-container">
                    </div>

            </div>
                        
            </main>
        </div>
    </div>

    <footer class="player-bar fixed-bottom bg-black p-3">
        <div class="row align-items-center">
            <div class="col-md-3">
                <div class="d-flex align-items-center">
                    <img src="images/cover1.jpg" alt="Now Playing" style="width: 50px; height: 50px;" class="me-3" id="player-cover">
                    <div>
                        <h6 class="mb-0" id="player-title">Pilih Lagu</h6>
                        <small id="player-artist">Artis</small>
                    </div>
                </div>
            </div>
            
        
            <div class="col-md-6 text-center">
                <button class="btn btn-link text-white fs-4" id="prev-song-btn"><i class="bi bi-skip-backward-fill"></i></button>
                <button class="btn btn-link text-white fs-3" id="main-play-pause-btn"><i class="bi bi-play-circle-fill"></i></button>
                <button class="btn btn-link text-white fs-4" id="next-song-btn"><i class="bi bi-skip-forward-fill"></i></button>


            <div class="progress mt-2" style="height: 5px;">
                <div class="progress-bar bg-success" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="progress-bar"></div>
            </div>
...
            </div>
            
            <div class="col-md-3 d-flex align-items-center justify-content-end">
                <i class="bi bi-volume-up-fill me-2"></i>
                <input type="range" class="form-range" min="0" max="1" step="0.01" style="width: 100px;" id="volume-control">
            </div>
        </div>
        
        <audio id="audio-player" src=""></audio>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
