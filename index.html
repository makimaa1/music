<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Music Player</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-white">

    <nav class="navbar navbar-dark bg-black d-md-none fixed-top">
        <div class="container-fluid">
          <span class="navbar-brand">My Player</span>
          <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebarMenu" aria-controls="mobileSidebarMenu">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
    </nav>
    
    <div class="container-fluid"> 
        <div class="row"> <nav class="col-md-2 d-none d-md-block bg-black sidebar-desktop sidebar-sticky">
                <h5 class="text-white p-3">My Player</h5> 
                <div class="sidebar-sticky p-0"> 
                    <ul class="nav flex-column"> 
                        <li class="nav-item">
                            <a class="nav-link active text-white p-3" href="#" id="home-link-desktop">
                                <i class="bi bi-house-door-fill me-2"></i> Home
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white p-3" href="#" id="search-link-desktop">
                                <i class="bi bi-search me-2"></i> Search
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white p-3" href="#" id="library-link-desktop">
                                <i class="bi bi-collection-fill me-2"></i> Your Library
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <div class="offcanvas offcanvas-start bg-black d-md-none" tabindex="-1" id="mobileSidebarMenu">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title text-white">My Player</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body p-0">
                    <ul class="nav flex-column"> 
                        <li class="nav-item">
                            <a class="nav-link active text-white p-3" href="#" id="home-link-mobile" data-bs-dismiss="offcanvas">
                                <i class="bi bi-house-door-fill me-2"></i> Home
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white p-3" href="#" id="search-link-mobile" data-bs-dismiss="offcanvas">
                                <i class="bi bi-search me-2"></i> Search
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white p-3" href="#" id="library-link-mobile" data-bs-dismiss="offcanvas">
                                <i class="bi bi-collection-fill me-2"></i> Your Library
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <main class="col-md-10 px-md-4 main-content"> <div id="home-view">
                    <h2 class="mt-4">Welcome Back!</h2>
                    <p>Check out some music.</p>
                    <div class="row" id="song-list-container"></div>
                </div>
                <div id="search-view" style="display: none;">
                    <h2 class="mt-4">Search</h2>
                    <p>Search for your favorite songs or artists.</p>
                    <div class="row mt-4">
                        <div class="col-md-8">
                            <input type="text" class="form-control form-control-lg" placeholder="What do you want to listen to?" id="search-input">
                        </div>
                    </div>
                    <div class="row mt-4" id="search-results-container"></div>
                </div>
            </main>

        </div> </div> <footer class="player-bar fixed-bottom bg-black p-3">
        <div class="row align-items-center">
            <div class="col-md-3">
                <div class="d-flex align-items-center">
                    <img src="images/cover1.jpg" alt="Now Playing" style="width: 50px; height: 50px;" class="me-3" id="player-cover">
                    <div>
                        <h6 class="mb-0" id="player-title">Pilih Lagu</h6>
                        <small id="player-artist">Artis</small>
                    </div>
                </div>
            </div>
            <div class="col-md-6 text-center">
                <button class="btn btn-link text-white fs-4" id="prev-song-btn"><i class="bi bi-skip-backward-fill"></i></button>
                <button class="btn btn-link text-white fs-3" id="main-play-pause-btn"><i class="bi bi-play-circle-fill"></i></button>
                <button class="btn btn-link text-white fs-4" id="next-song-btn"><i class="bi bi-skip-forward-fill"></i></button>
                <div class="progress mt-2" style="height: 5px;">
                    <div class="progress-bar bg-success" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="progress-bar"></div>
                </div>
            </div>
            <div class="col-md-3 d-flex align-items-center justify-content-end">
                <i class="bi bi-volume-up-fill me-2"></i>
                <input type="range" class="form-range" min="0" max="1" step="0.01" style="width: 100px;" id="volume-control">
            </div>
        </div>
        <audio id="audio-player" src=""></audio>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/script.js"></script>
</body>
</html>
